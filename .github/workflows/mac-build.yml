name: Build Mac App

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npx electron-builder install-app-deps

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/
