name: Build Mac App

on:
  workflow_dispatch:   # manual trigger (important for you)

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/
